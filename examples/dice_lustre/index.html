<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>watershed · collaborative dice</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .wrap { text-align: center; max-width: 28rem; padding: 2rem; }
      h1 { font-size: 1.25rem; font-weight: 600; }
      .status { opacity: 0.7; margin-top: -0.5rem; }
      .die {
        font-size: 6rem;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        margin: 1rem 0;
      }
      .controls { display: flex; gap: 0.5rem; justify-content: center; }
      button {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid currentColor;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }
      button:hover { opacity: 0.8; }
      .entries { list-style: none; padding: 0; text-align: left; display: inline-block; }
      .entries li { font-variant-numeric: tabular-nums; }
      .empty { opacity: 0.5; }
      .hint { font-size: 0.8rem; opacity: 0.6; margin-top: 2rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { main } from "./dist/dice_lustre.mjs";
      main();
    </script>
  </body>
</html>
