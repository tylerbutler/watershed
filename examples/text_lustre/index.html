<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>watershed · collaborative text</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: start center;
        min-height: 100vh;
        margin: 0;
      }
      .wrap { width: 100%; max-width: 46rem; padding: 2rem; }
      h1 { font-size: 1.25rem; font-weight: 600; }
      .status { opacity: 0.7; margin-top: -0.5rem; }
      .editor {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin: 1.5rem 0 0.5rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid color-mix(in srgb, currentColor 35%, transparent);
        background: transparent;
        color: inherit;
        font: inherit;
        line-height: 1.5;
        resize: vertical;
      }
      .compose { display: flex; gap: 0.5rem; margin: 0.75rem 0; flex-wrap: wrap; }
      .compose input { flex: 1 1 auto; min-width: 0; }
      input {
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid color-mix(in srgb, currentColor 35%, transparent);
        background: transparent;
        color: inherit;
        font: inherit;
      }
      button {
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid currentColor;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }
      button:hover:not(:disabled) { opacity: 0.8; }
      button:disabled { opacity: 0.3; cursor: default; }
      .hint { font-size: 0.8rem; opacity: 0.6; margin-top: 2rem; }
      .error {
        color: #c0392b;
        font-size: 0.85rem;
        min-height: 1.2rem;
        margin: 0.25rem 0;
      }
      .anchor {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid color-mix(in srgb, currentColor 25%, transparent);
      }
      .anchor h2 { font-size: 1rem; margin-bottom: 0.25rem; }
      .anchor p { font-size: 0.8rem; opacity: 0.7; }
      .anchor-detail {
        font-variant-numeric: tabular-nums;
        opacity: 0.9 !important;
      }
      .diagnostics {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid color-mix(in srgb, currentColor 25%, transparent);
      }
      .diagnostics h2 { font-size: 1rem; margin-bottom: 0.25rem; }
      .diagnostics p { font-size: 0.8rem; opacity: 0.7; }
      .diagnostics pre {
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: color-mix(in srgb, currentColor 8%, transparent);
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 0.75rem;
      }
      .diagnostic-log { max-height: 16rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { main } from "./dist/text_lustre.mjs";
      main();
    </script>
  </body>
</html>
