name = "watershed"
version = "0.1.0"
description = "Gleam DDS client toolkit for levee — SharedMap kernel, runtime actor, and wire codecs"
licences = ["MIT"]
repository = { type = "github", user = "tylerbutler", repo = "watershed" }
gleam = ">= 1.7.0"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.62.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_crypto = ">= 1.0.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_fetch = ">= 1.4.0 and < 2.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
lattice_counters = ">= 1.1.0 and < 2.0.0"
spillway = { git = "https://github.com/tylerbutler/spillway", ref = "main" }
aquamarine = { git = "https://github.com/tylerbutler/aquamarine", ref = "main" }

[dev-dependencies]
startest = ">= 0.8.0 and < 1.0.0"
qcheck = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.5.0 and < 3.0.0"
envoy = ">= 1.0.0 and < 2.0.0"
exception = ">= 2.1.0 and < 3.0.0"
