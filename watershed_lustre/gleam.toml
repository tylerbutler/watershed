name = "watershed_lustre"
version = "0.1.0"
description = "Lustre effect bindings for watershed — connect, subscription, and timer effects that make the JS DDS client feel framework-native"
licences = ["MIT"]
repository = { type = "github", user = "tylerbutler", repo = "watershed" }
gleam = ">= 1.7.0"
target = "javascript"

[dependencies]
gleam_stdlib = ">= 0.62.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
watershed = { path = ".." }
