# Netlify configuration for the watershed landing site.
# The site lives in website/; its build compiles the Gleam kernel to
# JavaScript first (see website/scripts/netlify-build.sh).

[build]
  base = "website"
  command = "./scripts/netlify-build.sh"
  # Relative to base, so this publishes website/dist.
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  GLEAM_VERSION = "1.16.0"
